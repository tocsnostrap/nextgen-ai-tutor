<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent/Teacher Dashboard — NextGen AI Tutor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .login-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .login-card {
            background: #fff; border-radius: 16px; padding: 40px;
            max-width: 400px; width: 90%; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card h2 { margin-bottom: 8px; color: #5b21b6; }
        .login-card p { color: #666; margin-bottom: 24px; font-size: 14px; }
        .login-card input {
            width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb;
            border-radius: 10px; font-size: 14px; margin-bottom: 12px;
            outline: none; transition: border-color 0.2s;
        }
        .login-card input:focus { border-color: #7c3aed; }
        .login-card button {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; border: none; border-radius: 10px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: transform 0.1s;
        }
        .login-card button:hover { transform: scale(1.02); }
        .login-card .demo-link {
            display: block; margin-top: 16px; color: #7c3aed;
            font-size: 13px; cursor: pointer; text-decoration: underline;
        }
        .hidden { display: none !important; }

        header {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 16px 32px; display: flex; align-items: center;
            justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        header h1 { font-size: 20px; color: #5b21b6; }
        header h1 span { font-weight: 400; color: #888; font-size: 14px; margin-left: 8px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .child-selector {
            padding: 8px 14px; border: 2px solid #e5e7eb; border-radius: 10px;
            font-size: 14px; outline: none; background: #fff;
        }
        .logout-btn {
            padding: 8px 16px; background: #ef4444; color: #fff; border: none;
            border-radius: 8px; font-size: 13px; cursor: pointer;
        }

        .dashboard { max-width: 1200px; margin: 24px auto; padding: 0 16px; }

        .overview-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .overview-card {
            background: #fff; border-radius: 14px; padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            text-align: center; transition: transform 0.2s;
        }
        .overview-card:hover { transform: translateY(-2px); }
        .overview-card .icon { font-size: 28px; margin-bottom: 8px; }
        .overview-card .value { font-size: 28px; font-weight: 700; color: #5b21b6; }
        .overview-card .label { font-size: 12px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

        .card {
            background: #fff; border-radius: 14px; padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .card h3 { font-size: 16px; color: #374151; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding-top: 8px; }
        .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .bar {
            width: 100%; border-radius: 6px 6px 0 0;
            background: linear-gradient(180deg, #7c3aed, #a78bfa);
            transition: height 0.6s ease; min-height: 4px;
        }
        .bar-label { font-size: 11px; color: #888; margin-top: 6px; }
        .bar-value { font-size: 11px; color: #5b21b6; font-weight: 600; margin-bottom: 4px; }

        .mastery-bars { display: flex; flex-direction: column; gap: 12px; }
        .mastery-row { display: flex; align-items: center; gap: 10px; }
        .mastery-name { width: 100px; font-size: 13px; color: #555; text-transform: capitalize; }
        .mastery-track { flex: 1; height: 14px; background: #f3f4f6; border-radius: 7px; overflow: hidden; }
        .mastery-fill { height: 100%; border-radius: 7px; transition: width 0.6s ease; }
        .mastery-pct { width: 45px; font-size: 13px; font-weight: 600; text-align: right; }

        .activity-feed { max-height: 320px; overflow-y: auto; }
        .feed-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 0; border-bottom: 1px solid #f3f4f6;
        }
        .feed-item:last-child { border-bottom: none; }
        .feed-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
        .feed-desc { font-size: 13px; color: #555; }
        .feed-time { font-size: 11px; color: #aaa; margin-top: 2px; }

        .skill-gap { display: flex; flex-direction: column; gap: 8px; }
        .gap-section h4 { font-size: 13px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .gap-tag {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin: 2px 4px;
        }
        .gap-weak { background: #fef2f2; color: #dc2626; }
        .gap-strong { background: #f0fdf4; color: #16a34a; }

        .goals-section { margin-bottom: 24px; }
        .goal-form {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
            align-items: flex-end;
        }
        .goal-form label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
        .goal-form select, .goal-form input[type="number"] {
            padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 8px;
            font-size: 13px; outline: none;
        }
        .goal-form button {
            padding: 8px 20px; background: #7c3aed; color: #fff; border: none;
            border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .goal-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .goal-info { flex: 1; }
        .goal-info .goal-label { font-size: 13px; font-weight: 600; color: #333; text-transform: capitalize; }
        .goal-info .goal-detail { font-size: 11px; color: #888; }
        .goal-progress-track { width: 120px; height: 10px; background: #f3f4f6; border-radius: 5px; overflow: hidden; }
        .goal-progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 5px; }
        .goal-pct { font-size: 13px; font-weight: 600; color: #5b21b6; width: 45px; text-align: right; }

        .weekly-report-card { margin-bottom: 24px; }
        .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .report-stat { text-align: center; padding: 12px; background: #f9fafb; border-radius: 10px; }
        .report-stat .val { font-size: 22px; font-weight: 700; color: #5b21b6; }
        .report-stat .lbl { font-size: 11px; color: #888; margin-top: 2px; }
        .recommendations { margin-top: 16px; }
        .recommendations li {
            font-size: 13px; color: #555; padding: 6px 0;
            list-style: none; display: flex; align-items: center; gap: 6px;
        }
        .recommendations li::before { content: "💡"; }

        .back-link {
            display: inline-block; margin: 16px 0; color: #fff; text-decoration: none;
            font-size: 14px; opacity: 0.9;
        }
        .back-link:hover { opacity: 1; text-decoration: underline; }

        .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
        .error-msg { color: #dc2626; background: #fef2f2; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin: 12px 0; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>👨‍🏫 Parent/Teacher Dashboard</h2>
        <p>Sign in to view your child's learning progress</p>
        <input type="email" id="loginEmail" placeholder="Email" value="teacher@example.com">
        <input type="password" id="loginPassword" placeholder="Password" value="password">
        <input type="text" id="childUserId" placeholder="Child's User ID" value="demo_user">
        <button onclick="handleLogin()">Sign In</button>
        <span class="demo-link" onclick="demoLogin()">Use Demo Access</span>
    </div>
</div>

<div id="dashboardContainer" class="hidden">
    <header>
        <h1>📊 Parent Dashboard <span>NextGen AI Tutor</span></h1>
        <div class="header-right">
            <input type="text" id="childIdInput" class="child-selector" placeholder="Child User ID" value="demo_user">
            <button onclick="loadDashboard()" style="padding:8px 14px;background:#7c3aed;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">Load</button>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <div class="dashboard">
        <a href="/" class="back-link">← Back to Learning App</a>

        <div id="overviewCards" class="overview-cards"></div>

        <div class="grid-2">
            <div class="card">
                <h3>📈 Daily Activity (This Week)</h3>
                <div id="dailyChart" class="bar-chart"></div>
            </div>
            <div class="card">
                <h3>🎯 Subject Mastery</h3>
                <div id="masteryBars" class="mastery-bars"></div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h3>📋 Recent Activity</h3>
                <div id="activityFeed" class="activity-feed"></div>
            </div>
            <div class="card">
                <h3>🔍 Skill Gap Analysis</h3>
                <div id="skillGap" class="skill-gap"></div>
            </div>
        </div>

        <div class="card goals-section">
            <h3>🎯 Learning Goals</h3>
            <div class="goal-form">
                <div>
                    <label>Goal Type</label>
                    <select id="goalType">
                        <option value="minutes">Daily Minutes</option>
                        <option value="lessons">Lessons</option>
                        <option value="xp">XP Target</option>
                    </select>
                </div>
                <div>
                    <label>Target</label>
                    <input type="number" id="goalTarget" value="30" min="1">
                </div>
                <div>
                    <label>Period</label>
                    <select id="goalPeriod">
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                    </select>
                </div>
                <button onclick="createGoal()">Set Goal</button>
            </div>
            <div id="goalsList"></div>
        </div>

        <div class="card weekly-report-card">
            <h3>📊 Weekly Progress Report</h3>
            <div id="weeklyReport"></div>
        </div>
    </div>
</div>

<script>
const API_BASE = '/api/v1/parent';
let authToken = null;
let currentChildId = 'demo_user';

function demoLogin() {
    authToken = 'access_token_teacher_demo';
    currentChildId = document.getElementById('childUserId').value || 'demo_user';
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('dashboardContainer').classList.remove('hidden');
    document.getElementById('childIdInput').value = currentChildId;
    loadDashboard();
}

function handleLogin() {
    authToken = 'access_token_teacher_demo';
    currentChildId = document.getElementById('childUserId').value || 'demo_user';
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('dashboardContainer').classList.remove('hidden');
    document.getElementById('childIdInput').value = currentChildId;
    loadDashboard();
}

function handleLogout() {
    authToken = null;
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('dashboardContainer').classList.add('hidden');
}

async function apiFetch(url) {
    const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${authToken}` },
    });
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    return res.json();
}

async function apiPost(url, body) {
    const res = await fetch(url, {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    return res.json();
}

async function loadDashboard() {
    currentChildId = document.getElementById('childIdInput').value || 'demo_user';
    try {
        const [progress, feed, report] = await Promise.all([
            apiFetch(`${API_BASE}/child-progress/${currentChildId}`),
            apiFetch(`${API_BASE}/activity-feed/${currentChildId}`),
            apiFetch(`${API_BASE}/weekly-report/${currentChildId}`),
        ]);
        renderOverview(progress.overview);
        renderDailyChart(progress.daily_activity);
        renderMastery(progress.subject_mastery);
        renderActivityFeed(feed.feed);
        renderSkillGap(progress.skill_gap_analysis);
        renderGoals(progress.active_goals);
        renderWeeklyReport(report);
    } catch (e) {
        console.error('Dashboard load error:', e);
        document.getElementById('overviewCards').innerHTML = `<div class="error-msg">Failed to load dashboard data. Please try again.</div>`;
    }
}

function renderOverview(overview) {
    const cards = [
        { icon: '⚡', value: overview.total_xp.toLocaleString(), label: 'Total XP' },
        { icon: '🔥', value: overview.current_streak || overview.streak, label: 'Day Streak' },
        { icon: '📚', value: overview.sessions_this_week, label: 'Sessions' },
        { icon: '⏱️', value: overview.total_learning_minutes + 'm', label: 'Learning Time' },
        { icon: '🏆', value: overview.achievements_count, label: 'Achievements' },
    ];
    document.getElementById('overviewCards').innerHTML = cards.map(c => `
        <div class="overview-card">
            <div class="icon">${c.icon}</div>
            <div class="value">${c.value}</div>
            <div class="label">${c.label}</div>
        </div>
    `).join('');
}

function renderDailyChart(activity) {
    if (!activity || !activity.length) {
        document.getElementById('dailyChart').innerHTML = '<div class="loading">No activity data</div>';
        return;
    }
    const maxMin = Math.max(...activity.map(a => a.minutes), 1);
    document.getElementById('dailyChart').innerHTML = activity.map(a => {
        const h = Math.max((a.minutes / maxMin) * 130, 4);
        return `<div class="bar-col">
            <div class="bar-value">${a.minutes}m</div>
            <div class="bar" style="height:${h}px"></div>
            <div class="bar-label">${a.day.substring(0, 3)}</div>
        </div>`;
    }).join('');
}

function renderMastery(mastery) {
    const container = document.getElementById('masteryBars');
    const entries = Object.entries(mastery);
    if (!entries.length) {
        container.innerHTML = '<div class="loading">No mastery data yet</div>';
        return;
    }
    const sorted = entries.sort((a, b) => b[1].mastery - a[1].mastery).slice(0, 10);
    container.innerHTML = sorted.map(([name, data]) => {
        const pct = Math.round(data.mastery * 100);
        let color = '#ef4444';
        if (pct >= 80) color = '#16a34a';
        else if (pct >= 50) color = '#f59e0b';
        else if (pct >= 30) color = '#f97316';
        return `<div class="mastery-row">
            <div class="mastery-name">${name}</div>
            <div class="mastery-track"><div class="mastery-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="mastery-pct" style="color:${color}">${pct}%</div>
        </div>`;
    }).join('');
}

function renderActivityFeed(feed) {
    const container = document.getElementById('activityFeed');
    if (!feed || !feed.length) {
        container.innerHTML = '<div class="loading">No recent activity</div>';
        return;
    }
    container.innerHTML = feed.slice(0, 15).map(item => {
        const icon = item.type === 'quiz_completed' ? '📝' : '💬';
        const time = item.timestamp ? new Date(item.timestamp).toLocaleDateString() : '';
        return `<div class="feed-item">
            <div class="feed-icon">${icon}</div>
            <div>
                <div class="feed-desc">${item.description}</div>
                <div class="feed-time">${time}</div>
            </div>
        </div>`;
    }).join('');
}

function renderSkillGap(analysis) {
    const container = document.getElementById('skillGap');
    let html = '';
    if (analysis.weak_areas && analysis.weak_areas.length) {
        html += `<div class="gap-section"><h4>Needs Improvement</h4><div>`;
        html += analysis.weak_areas.map(s => `<span class="gap-tag gap-weak">${s.skill} (${Math.round(s.mastery * 100)}%)</span>`).join('');
        html += `</div></div>`;
    }
    if (analysis.strong_areas && analysis.strong_areas.length) {
        html += `<div class="gap-section" style="margin-top:12px"><h4>Strong Areas</h4><div>`;
        html += analysis.strong_areas.map(s => `<span class="gap-tag gap-strong">${s.skill} (${Math.round(s.mastery * 100)}%)</span>`).join('');
        html += `</div></div>`;
    }
    if (!html) html = '<div class="loading">No skill data available yet</div>';
    container.innerHTML = html;
}

function renderGoals(goals) {
    const container = document.getElementById('goalsList');
    if (!goals || !goals.length) {
        container.innerHTML = '<div class="loading">No active goals. Set one above!</div>';
        return;
    }
    container.innerHTML = goals.map(g => `
        <div class="goal-item">
            <div class="goal-info">
                <div class="goal-label">${g.goal_type} Goal</div>
                <div class="goal-detail">${g.current_value} / ${g.target_value} (${g.period})</div>
            </div>
            <div class="goal-progress-track">
                <div class="goal-progress-fill" style="width:${g.progress_pct}%"></div>
            </div>
            <div class="goal-pct">${g.progress_pct}%</div>
        </div>
    `).join('');
}

function renderWeeklyReport(report) {
    const container = document.getElementById('weeklyReport');
    const s = report.summary;
    const sk = report.skill_overview;
    let html = `
        <div style="font-size:12px;color:#888;margin-bottom:12px;">
            ${report.report_period.start} — ${report.report_period.end}
        </div>
        <div class="report-grid">
            <div class="report-stat"><div class="val">${s.total_xp_earned}</div><div class="lbl">XP Earned</div></div>
            <div class="report-stat"><div class="val">${s.current_streak}</div><div class="lbl">Streak</div></div>
            <div class="report-stat"><div class="val">${s.lessons_completed}</div><div class="lbl">Lessons</div></div>
            <div class="report-stat"><div class="val">${s.total_learning_minutes}m</div><div class="lbl">Study Time</div></div>
            <div class="report-stat"><div class="val">${s.average_quiz_score}%</div><div class="lbl">Avg Quiz Score</div></div>
            <div class="report-stat"><div class="val">${sk.mastered}</div><div class="lbl">Skills Mastered</div></div>
        </div>
    `;
    if (report.recommendations && report.recommendations.length) {
        html += `<ul class="recommendations">${report.recommendations.map(r => `<li>${r}</li>`).join('')}</ul>`;
    }
    container.innerHTML = html;
}

async function createGoal() {
    const goalType = document.getElementById('goalType').value;
    const target = parseInt(document.getElementById('goalTarget').value) || 30;
    const period = document.getElementById('goalPeriod').value;
    try {
        await apiPost(`${API_BASE}/learning-goals`, {
            child_user_id: currentChildId,
            goal_type: goalType,
            target_value: target,
            period: period,
        });
        loadDashboard();
    } catch (e) {
        console.error('Failed to create goal:', e);
        alert('Failed to create goal. Please try again.');
    }
}
</script>
</body>
</html>
